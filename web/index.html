<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGVL - Dados Pessoais</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-light: #2C5282;
            --secondary: #4A90A4;
            --accent: #E8B339;
            --success: #2E7D32;
            --danger: #C62828;
            --warning: #F57C00;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #2D3748;
            --text-muted: #718096;
            --border: #E2E8F0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

        .header { background: var(--primary); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: var(--shadow); }
        .header h1 { font-size: 18px; }
        .menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }

        .sidebar { width: 200px; background: var(--primary); position: fixed; top: 50px; left: 0; bottom: 0; padding: 16px 0; overflow-y: auto; z-index: 99; }
        .nav-item { display: block; padding: 10px 18px; color: rgba(255,255,255,0.8); text-decoration: none; border-left: 3px solid transparent; cursor: pointer; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        .main { margin-left: 200px; padding: 66px 20px 20px; max-width: 1100px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--card-bg); padding: 16px; border-radius: 10px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .section { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .section-title { font-size: 16px; color: var(--primary); font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }

        .tree { text-align: center; }
        .gen { margin: 12px 0; }
        .gen-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .gen-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .node { background: var(--card-bg); border: 2px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 160px; max-width: 220px; text-align: center; box-shadow: var(--shadow); }
        .node.grandparent { border-color: var(--accent); background: #FFF8E1; }
        .node.spouse { border-color: #E91E63; background: #FCE4EC; }
        .node.sibling { border-color: var(--secondary); }
        .node.nephew { border-color: #9C27B0; background: #F3E5F5; }
        .node.child { border-color: var(--success); background: #E8F5E9; border-width: 2px; }
        .node-name { font-weight: 600; font-size: 13px; color: var(--text); }
        .node-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .connector { width: 2px; height: 20px; background: var(--border); margin: 0 auto; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .info-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .info-card h3 { font-size: 14px; color: var(--primary); margin-bottom: 12px; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
        .row:last-child { border-bottom: none; }
        .row .label { color: var(--text-muted); }
        .row .value { color: var(--text); text-align: right; font-weight: 500; }

        .company { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .company-name { font-weight: 600; font-size: 15px; color: var(--primary); margin-bottom: 8px; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-ativa { background: #C8E6C9; color: var(--success); }
        .badge-baixada { background: #FFCDD2; color: var(--danger); }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 60px 12px 12px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .info-grid { grid-template-columns: 1fr; }
        }

        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        .spinner { border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <h1>🌳 RGVL</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </header>
    <nav class="sidebar" id="sidebar">
        <a class="nav-item active" data-section="overview">📊 Visão Geral</a>
        <a class="nav-item" data-section="family">👨‍👩‍👧 Família</a>
        <a class="nav-item" data-section="person">👤 Dados Pessoais</a>
        <a class="nav-item" data-section="companies">🏢 Empresas</a>
        <a class="nav-item" data-section="research">🔍 Pesquisa</a>
    </nav>
    <main class="main"><div id="app"><div class="loading"><div class="spinner"></div>Carregando...</div></div></main>
    <script>
    async function findAPI() {
        const o = window.location.origin;
        const ports = [5003];
        for (const p of ports) {
            try { const r = await fetch(`${o.replace(/:\d+/, ':'+p)}/api/health`, {signal:AbortSignal.timeout(3000)}); if (r.ok) return `${o.replace(/:\d+/, ':'+p)}/api`; } catch(e) {}
        }
        return `${o.replace(/:\d+/, ':5003')}/api`;
    }

    function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtDate(d) { if (!d) return '-'; try { return new Date(d).toLocaleDateString('pt-BR'); } catch(e) { return d; } }
    function fmtMoney(v) { if (!v) return '-'; return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v); }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', function() {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.section).scrollIntoView({behavior:'smooth'});
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        });
    });

    // RGVL pai ID — Rodrigo Gorgulho de Vasconcellos Lanna
    const PAI_ID = 6;

    async function load() {
        try {
            const api = await findAPI();
            const [tree, gen1, gen3, gen4, companies, summary, tasks] = await Promise.all([
                fetch(api+'/family/person/'+PAI_ID+'/tree').then(r=>r.json()).catch(()=>null),
                fetch(api+'/family/generation/1').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/generation/3').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/generation/4').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/assets/companies').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/summary').then(r=>r.json()).catch(()=>{}),
                fetch(api+'/research/tasks?status=pendente').then(r=>r.json()).catch(()=>[]),
            ]);
            render({tree, gen1:gen1||[], gen3:gen3||[], gen4:gen4||[], companies:companies||[], summary, tasks:tasks||[]});
        } catch(e) {
            document.getElementById('app').innerHTML = '<div class="section"><h2>⚠️ Erro</h2><p>'+esc(e.message)+'</p></div>';
        }
    }

    function render(D) {
        const t = D.tree || {};
        const p = t || {};
        const spouse = t.conjuge || null;
        const children = t.filhos || [];
        const siblings = t.irmaos || [];
        const pai = t.pai || null;
        const mae = t.mae || null;

        // Split gen1 by parent
        const primosHenrique = D.gen1.filter(c => c.observacoes && c.observacoes.includes('Henrique'));
        const primosMarcelo = D.gen1.filter(c => c.observacoes && c.observacoes.includes('Marcelo'));
        const primosJunia = D.gen1.filter(c => c.observacoes && c.observacoes.includes('Júnia'));

        // Soma capital empresas
        const totalCapital = D.companies.reduce((s,c) => s + (c.capital || 0), 0);

        document.getElementById('app').innerHTML = `
        <!-- Overview -->
        <div class="section" id="overview">
            <div class="section-title">📊 Visão Geral</div>
            <div class="stats">
                <div class="stat"><div class="stat-value">${D.summary.total_pessoas || 0}</div><div class="stat-label">Pessoas</div></div>
                <div class="stat"><div class="stat-value">${siblings.length}</div><div class="stat-label">Tios</div></div>
                <div class="stat"><div class="stat-value">${children.length}</div><div class="stat-label">Filhos</div></div>
                <div class="stat"><div class="stat-value">${D.gen1.length}</div><div class="stat-label">Primos</div></div>
                <div class="stat"><div class="stat-value">${D.companies.length}</div><div class="stat-label">Empresas</div></div>
                <div class="stat"><div class="stat-value">${D.summary.relacionamentos_confirmados || 0}</div><div class="stat-label">Vínculos Confirmados</div></div>
                <div class="stat"><div class="stat-value">${D.tasks.length}</div><div class="stat-label">Tarefas Pendentes</div></div>
            </div>
        </div>

        <!-- Patrimony -->
        <div class="section">
            <div class="section-title">💰 Capital Empresas</div>
            <div class="stats">
                <div class="stat" style="background:#E3F2FD;border-color:var(--primary-light)">
                    <div class="stat-value" style="color:var(--primary-light)">${fmtMoney(totalCapital)}</div>
                    <div class="stat-label">Capital Social Total</div>
                </div>
                <div class="stat" style="background:#C8E6C9;border-color:var(--success)">
                    <div class="stat-value" style="color:var(--success)">${D.companies.filter(c=>c.status_jucemg==='ativa').length}</div>
                    <div class="stat-label">Empresas Ativas</div>
                </div>
                <div class="stat" style="background:#FFCDD2;border-color:var(--danger)">
                    <div class="stat-value" style="color:var(--danger)">${D.companies.filter(c=>c.status_jucemg==='baixa').length}</div>
                    <div class="stat-label">Empresas Baixadas</div>
                </div>
            </div>
        </div>

        <!-- Family Tree -->
        <div class="section" id="family">
            <div class="section-title">🌳 Árvore Genealógica (${D.summary.total_pessoas || 0} pessoas)</div>
            <div class="tree">

                <!-- Bisavós -->
                <div class="gen">
                    <div class="gen-label">Geração 5 — Bisavós</div>
                    <div class="gen-row">
                        <div class="node grandparent">
                            <div class="node-name">Edmundo Mariano da Costa Lanna</div>
                            <div class="node-detail">1878-1968 · Dentista</div>
                            <div class="node-detail">+ Maria da Glória de Vasconcellos</div>
                        </div>
                    </div>
                </div>
                <div class="connector"></div>

                <!-- Avós -->
                <div class="gen">
                    <div class="gen-label">Geração 4 — Avós</div>
                    <div class="gen-row">
                        ${pai ? `<div class="node grandparent">
                            <div class="node-name">${esc(pai.nome_completo)}</div>
                            <div class="node-detail">${esc(pai.data_nascimento || '?')} - ${esc(pai.data_falecimento || '?')} · ${esc(pai.profissao || '-')}</div>
                        </div>` : ''}
                        ${mae ? `<div class="node grandparent">
                            <div class="node-name">${esc(mae.nome_completo)}</div>
                            <div class="node-detail">${esc(mae.data_nascimento || '?')} - ${esc(mae.data_falecimento || '?')}</div>
                        </div>` : ''}
                    </div>
                    ${D.gen4.length > 2 ? `<div style="margin-top:6px;font-size:11px;color:var(--text-muted)">Irmãs: ${D.gen4.filter(g=>g.id!==pai?.id&&g.id!==mae?.id).map(g=>g.nome_completo.split(' ')[0]+' ('+g.data_nascimento+'-'+g.data_falecimento+')').join(' · ')}</div>` : ''}
                </div>
                <div class="connector"></div>

                <!-- Pais + Tios -->
                <div class="gen">
                    <div class="gen-label">Geração 3 — Pais + Tios</div>
                    <div class="gen-row">
                        ${siblings.map(s => `
                            <div class="node sibling">
                                <div class="node-name">${esc(s.nome_completo)}</div>
                                <div class="node-detail">${esc((s.observacoes || '').substring(0, 70))}${(s.observacoes||'').length > 70 ? '...' : ''}</div>
                            </div>
                        `).join('')}
                        <div class="node" style="border-color:var(--accent);background:#FFF8E1">
                            <div class="node-name">👨 ${esc(p.nome_completo)}</div>
                            <div class="node-detail">${esc(p.profissao || '-')}</div>
                            <div class="node-detail">${esc(p.empresa || '')}</div>
                            <div class="node-detail">${esc(p.email || '')}</div>
                        </div>
                    </div>
                    ${spouse ? `
                    <div style="margin-top:8px">
                        <div class="gen-label">Cônjuge</div>
                        <div class="gen-row">
                            <div class="node spouse">
                                <div class="node-name">👩 ${esc(spouse.nome_completo)}</div>
                                <div class="node-detail">${esc(spouse.profissao || '-')}</div>
                                ${spouse.rg ? `<div class="node-detail">RG: ${esc(spouse.rg)}</div>` : ''}
                                ${spouse.cpf ? `<div class="node-detail">CPF: ${esc(spouse.cpf)}</div>` : ''}
                            </div>
                        </div>
                    </div>` : ''}
                </div>
                <div class="connector"></div>

                <!-- Você -->
                <div class="gen">
                    <div class="gen-label">Geração 2 — Você (${children.length})</div>
                    <div class="gen-row">
                        ${children.map(c => `
                            <div class="node child">
                                <div class="node-name">⚡ ${esc(c.nome_completo)}</div>
                                <div class="node-detail">${esc(c.profissao || c.empresa || '-')}</div>
                                ${c.local_nascimento ? `<div class="node-detail">Nasc: ${esc(c.local_nascimento)}</div>` : ''}
                            </div>
                        `).join('') || '<div class="node"><div class="node-name">—</div></div>'}
                    </div>
                </div>
                <div class="connector"></div>

                <!-- Primos -->
                <div class="gen">
                    <div class="gen-label">Geração 1 — Primos (${D.gen1.length})</div>

                    ${primosHenrique.length ? `
                    <div style="margin-bottom:16px">
                        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">👨‍👧 Filhos de Henrique (${primosHenrique.length})</div>
                        <div class="gen-row">
                            ${primosHenrique.map(c => `
                                <div class="node nephew">
                                    <div class="node-name">${esc(c.nome_completo)}</div>
                                    <div class="node-detail">${esc((c.observacoes||'').split('.')[0])}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    ${primosMarcelo.length ? `
                    <div style="margin-bottom:16px">
                        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">👨‍👧 Filhos de Marcelo (${primosMarcelo.length})</div>
                        <div class="gen-row">
                            ${primosMarcelo.map(c => `
                                <div class="node nephew">
                                    <div class="node-name">${esc(c.nome_completo)}</div>
                                    <div class="node-detail">${esc((c.observacoes||'').split('.')[0])}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                    ${primosJunia.length ? `
                    <div style="margin-bottom:16px">
                        <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">👩‍👧 Filhos de Júnia (${primosJunia.length})</div>
                        <div class="gen-row">
                            ${primosJunia.map(c => `
                                <div class="node nephew">
                                    <div class="node-name">${esc(c.nome_completo)}</div>
                                    <div class="node-detail">${esc((c.observacoes||'').split('.')[0])}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>` : ''}

                </div>
            </div>
        </div>

        <!-- Person -->
        <div class="section" id="person">
            <div class="section-title">👤 ${esc(p.nome_completo || 'Dados Pessoais')}</div>
            <div class="info-grid">
                <div class="info-card">
                    <h3>Identificação</h3>
                    <div class="row"><span class="label">Nome</span><span class="value">${esc(p.nome_completo)}</span></div>
                    ${p.cpf ? `<div class="row"><span class="label">CPF</span><span class="value">${esc(p.cpf)}</span></div>` : ''}
                    ${p.rg ? `<div class="row"><span class="label">RG</span><span class="value">${esc(p.rg)}</span></div>` : ''}
                    <div class="row"><span class="label">Profissão</span><span class="value">${esc(p.profissao || '-')}</span></div>
                    <div class="row"><span class="label">Cargo</span><span class="value">${esc(p.cargo || '-')}</span></div>
                    <div class="row"><span class="label">Empresa</span><span class="value">${esc(p.empresa || '-')}</span></div>
                </div>
                <div class="info-card">
                    <h3>Pessoal</h3>
                    <div class="row"><span class="label">Nascimento</span><span class="value">${esc(p.data_nascimento || '-')}</span></div>
                    <div class="row"><span class="label">Local</span><span class="value">${esc(p.local_nascimento || '-')}</span></div>
                    <div class="row"><span class="label">Geração</span><span class="value">${p.geracao || '-'}</span></div>
                    <div class="row"><span class="label">Status</span><span class="value">${esc(p.status || '-')}</span></div>
                </div>
                <div class="info-card">
                    <h3>Contato</h3>
                    <div class="row"><span class="label">Email</span><span class="value">${esc(p.email || '-')}</span></div>
                    <div class="row"><span class="label">Telefone</span><span class="value">${esc(p.telefone || '-')}</span></div>
                    <div class="row"><span class="label">Endereço</span><span class="value">${esc(p.endereco || '-')}</span></div>
                </div>
                ${pai ? `
                <div class="info-card">
                    <h3>👨 Pai</h3>
                    <div class="row"><span class="label">Nome</span><span class="value">${esc(pai.nome_completo)}</span></div>
                    <div class="row"><span class="label">Nascimento</span><span class="value">${esc(pai.data_nascimento || '-')}</span></div>
                    <div class="row"><span class="label">Falecimento</span><span class="value">${esc(pai.data_falecimento || '-')}</span></div>
                    <div class="row"><span class="label">Profissão</span><span class="value">${esc(pai.profissao || '-')}</span></div>
                </div>` : ''}
                ${mae ? `
                <div class="info-card">
                    <h3>👩 Mãe</h3>
                    <div class="row"><span class="label">Nome</span><span class="value">${esc(mae.nome_completo)}</span></div>
                    <div class="row"><span class="label">Nascimento</span><span class="value">${esc(mae.data_nascimento || '-')}</span></div>
                    <div class="row"><span class="label">Falecimento</span><span class="value">${esc(mae.data_falecimento || '-')}</span></div>
                </div>` : ''}
            </div>
        </div>

        <!-- Companies -->
        <div class="section" id="companies">
            <div class="section-title">🏢 Empresas (${D.companies.length})</div>
            <div class="info-grid">
                ${D.companies.map(c => `
                    <div class="company">
                        <div class="company-name">${esc(c.nome_fantasia || c.razao_social)}</div>
                        <div class="row"><span class="label">CNPJ</span><span class="value">${esc(c.cnpj)}</span></div>
                        <div class="row"><span class="label">Razão Social</span><span class="value">${esc(c.razao_social)}</span></div>
                        <div class="row"><span class="label">Status</span><span class="value"><span class="badge ${c.status_jucemg==='ativa'?'badge-ativa':'badge-baixada'}">${esc(c.status_jucemg || '-')}</span></span></div>
                        ${c.capital ? `<div class="row"><span class="label">Capital</span><span class="value">${fmtMoney(c.capital)}</span></div>` : ''}
                        ${c.cidade ? `<div class="row"><span class="label">Local</span><span class="value">${esc(c.cidade)}/${esc(c.uf || '')}</span></div>` : ''}
                        ${c.data_abertura ? `<div class="row"><span class="label">Abertura</span><span class="value">${esc(c.data_abertura)}</span></div>` : ''}
                        ${c.data_baixa ? `<div class="row"><span class="label">Baixa</span><span class="value">${esc(c.data_baixa)}</span></div>` : ''}
                        ${c.endereco ? `<div class="row"><span class="label">Endereço</span><span class="value">${esc(c.endereco)}</span></div>` : ''}
                        ${c.socios ? (() => { try { return '<div style="margin-top:8px;font-size:11px;color:var(--text-muted)">📋 ' + JSON.parse(c.socios).map(s => s.nome + ' (' + s.participacao + ')').join(', ') + '</div>'; } catch(e) { return ''; } })() : ''}
                        ${c.observacoes ? `<div style="margin-top:6px;font-size:11px;color:var(--text-muted)">${esc(c.observacoes.substring(0, 120))}</div>` : ''}
                    </div>
                `).join('')}
            </div>
        </div>

        <!-- Research -->
        <div class="section" id="research">
            <div class="section-title">🔍 Tarefas de Pesquisa (${D.tasks.length} pendentes)</div>
            <div class="info-grid">
                ${D.tasks.map(t => `
                    <div class="info-card">
                        <h3>${esc(t.tarefa)}</h3>
                        <div class="row"><span class="label">Prioridade</span><span class="value" style="font-weight:600;color:${t.prioridade==='ALTA'?'var(--danger)':t.prioridade==='MEDIA'?'var(--warning)':'var(--text-muted)'}">${esc(t.prioridade || '-')}</span></div>
                        ${t.pessoa_alvo ? `<div class="row"><span class="label">Alvo</span><span class="value">${esc(t.pessoa_alvo)}</span></div>` : ''}
                        ${t.fontes_sugeridas ? `<div class="row"><span class="label">Fontes</span><span class="value">${esc(t.fontes_sugeridas)}</span></div>` : ''}
                    </div>
                `).join('')}
            </div>
        </div>
        `;
    }

    load();
    </script>
</body>
</html>
