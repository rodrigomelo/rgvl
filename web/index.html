<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGVL - Dados Pessoais</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        :root {
            --primary: #1E3A5F;
            --primary-light: #2C5282;
            --secondary: #4A90A4;
            --accent: #E8B339;
            --success: #2E7D32;
            --danger: #C62828;
            --warning: #F57C00;
            --bg: #F5F7FA;
            --card-bg: #FFFFFF;
            --text: #2D3748;
            --text-muted: #718096;
            --border: #E2E8F0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 12px rgba(0,0,0,0.12);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

        .header { background: var(--primary); color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 100; box-shadow: var(--shadow); }
        .header h1 { font-size: 18px; }
        .menu-toggle { background: none; border: none; color: white; font-size: 24px; cursor: pointer; display: none; }

        .sidebar { width: 200px; background: var(--primary); position: fixed; top: 50px; left: 0; bottom: 0; padding: 16px 0; overflow-y: auto; z-index: 99; }
        .nav-item { display: block; padding: 10px 18px; color: rgba(255,255,255,0.8); text-decoration: none; border-left: 3px solid transparent; cursor: pointer; font-size: 14px; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        .main { margin-left: 200px; padding: 66px 20px 20px; max-width: 1100px; }

        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat { background: var(--card-bg); padding: 16px; border-radius: 10px; box-shadow: var(--shadow); border: 1px solid var(--border); text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; color: var(--primary); }
        .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

        .section { background: var(--card-bg); padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .section-title { font-size: 16px; color: var(--primary); font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }

        .tree { text-align: center; }
        .gen { margin: 12px 0; }
        .gen-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .gen-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .node { background: var(--card-bg); border: 2px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 160px; max-width: 220px; text-align: center; box-shadow: var(--shadow); }
        .node.grandparent { border-color: var(--accent); background: #FFF8E1; }
        .node.spouse { border-color: #E91E63; background: #FCE4EC; }
        .node.sibling { border-color: var(--secondary); }
        .node.nephew { border-color: #9C27B0; background: #F3E5F5; }
        .node.child { border-color: var(--success); background: #E8F5E9; border-width: 2px; }
        .node-name { font-weight: 600; font-size: 13px; color: var(--text); }
        .node-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .connector { width: 2px; height: 20px; background: var(--border); margin: 0 auto; }

        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
        .info-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .info-card h3 { font-size: 14px; color: var(--primary); margin-bottom: 12px; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
        .row:last-child { border-bottom: none; }
        .row .label { color: var(--text-muted); }
        .row .value { color: var(--text); text-align: right; font-weight: 500; }

        .timeline { position: relative; padding-left: 30px; }
        .timeline::before { content: ''; position: absolute; left: 10px; top: 0; bottom: 0; width: 3px; background: linear-gradient(to bottom, var(--primary), var(--accent)); border-radius: 2px; }
        .timeline-event { position: relative; margin-bottom: 24px; padding: 16px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); }
        .timeline-event::before { content: ''; position: absolute; left: -26px; top: 20px; width: 14px; height: 14px; border-radius: 50%; border: 3px solid var(--accent); background: var(--primary); }
        .timeline-date { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
        .timeline-person { font-weight: 700; color: var(--primary); margin-bottom: 6px; font-size: 15px; }
        /* ============================================
           TIMELINE BADGES - Uniform size, color only varies
           ============================================ */
        .timeline-type {
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            padding: 0 10px !important;
            border-radius: 4px !important;
            font-size: 10px !important;
            font-weight: 600 !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            min-width: 85px !important;
            height: 20px !important;
            white-space: nowrap !important;
            box-sizing: border-box !important;
        }
        .timeline-type::before, .timeline-type::after { content: none !important; }
        /* Colors only */
        .timeline-type.birth { background: #D1FAE5; color: #065F46; }
        .timeline-type.death, .timeline-type.falecimento { background: #E5E7EB; color: #374151; }
        .timeline-type.marriage { background: #FEF3C7; color: #92400E; }
        .timeline-type.company { background: #DBEAFE; color: #1D4ED8; }
        .timeline-type.name_change { background: #EDE9FE; color: #6D28D9; }
        .timeline-type.legal { background: #FEF3C7; color: #92400E; }
        .timeline-type.paternity { background: #FCE7F3; color: #9D174D; }
        .timeline-type.family_contact { background: #E0E7FF; color: #3730A3; }
        .timeline-type.research, .timeline-event.research { display: none !important; }
        .timeline-desc { font-size: 14px; color: var(--text); line-height: 1.5; }
        .timeline-empty { text-align: center; color: var(--text-muted); padding: 40px; }
        .sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 12px; }
        .source-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
        .source-name { font-weight: 600; font-size: 13px; color: var(--primary); margin-bottom: 6px; word-break: break-word; }
        .source-count { font-size: 20px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
        .source-tables { display: flex; flex-wrap: wrap; gap: 4px; }
        .source-table { font-size: 10px; padding: 2px 6px; background: var(--bg); border-radius: 4px; color: var(--text-muted); }
        .sources-person-group { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 8px; }
        .sources-person-name { font-weight: 600; font-size: 13px; color: var(--primary); margin-bottom: 8px; }
        .sources-person-records { display: flex; flex-direction: column; gap: 5px; }
        .sources-record-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 4px 0; border-bottom: 1px solid var(--border); }
        .sources-record-item:last-child { border-bottom: none; }
        .sources-record-type { color: var(--text-muted); font-size: 10px; text-transform: uppercase; min-width: 60px; }
        .sources-record-label { color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .company { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .company-name { font-weight: 600; font-size: 15px; color: var(--primary); margin-bottom: 8px; }
        .badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
        .badge-ativa { background: #C8E6C9; color: var(--success); }
        .badge-baixada { background: #FFCDD2; color: var(--danger); }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 60px 12px 12px; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .info-grid { grid-template-columns: 1fr; }
        }

        .loading { text-align: center; padding: 60px; color: var(--text-muted); }
        .spinner { border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== SOURCES PANEL ===== */

        /* Source badge colors (inline CSS vars for dynamic use) */
        .source-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
            cursor: help;
            transition: opacity 0.2s;
            vertical-align: middle;
        }
        .source-badge:hover { opacity: 0.8; }
        .source-badge.sm { font-size: 9px; padding: 1px 5px; }
        .source-badge.lg { font-size: 11px; padding: 3px 9px; }

        /* Source type colors */
        .source-badge.source-gmail        { background: #FCE8E6; color: #C62828; }
        .source-badge.source-google_drive { background: #E8F0FE; color: #1D4ED8; }
        .source-badge.source-tjmg         { background: #FEF3C7; color: #92400E; }
        .source-badge.source-tjsp         { background: #F3E5F5; color: #6D28D9; }
        .source-badge.source-jucemg       { background: #DBEAFE; color: #1D4ED8; }
        .source-badge.source-jucep        { background: #DBEAFE; color: #1D4ED8; }
        .source-badge.source-cartorio     { background: #D1FAE5; color: #065F46; }
        .source-badge.source-web_search   { background: #E0E7FF; color: #3730A3; }
        .source-badge.source-familysearch { background: #FCE7F3; color: #9D174D; }
        .source-badge.source-manual        { background: #F1F5F9; color: #475569; }
        .source-badge.source-crea          { background: #FED7AA; color: #9A3412; }
        .source-badge.source-linkedin      { background: #E0E7FF; color: #3730A3; }
        .source-badge.source-escavador     { background: #EDE9FE; color: #6D28D9; }
        .source-badge.source-inteli        { background: #ECFDF5; color: #065F46; }
        .source-badge.source-default      { background: #F1F5F9; color: #475569; }

        /* Source row */
        .source-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            border-radius: 0;
        }
        .source-row:hover { background: var(--bg); }
        .source-row:last-child { border-bottom: none; }
        .source-row-label { font-size: 13px; color: var(--text); flex: 1; }
        .source-row-detail { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

        /* Sources tabs */
        .sources-tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
        .sources-tab { padding: 8px 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; font-weight: 500; }
        .sources-tab:hover { color: var(--primary); }
        .sources-tab.active { color: var(--primary); border-bottom-color: var(--accent); font-weight: 600; }

        /* Sources grid */
        .sources-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
        .sources-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .sources-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }
        .sources-card-emoji { font-size: 26px; margin-bottom: 8px; }
        .sources-card-name { font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 2px; }
        .sources-card-count { font-size: 22px; font-weight: 800; color: var(--text); }
        .sources-card-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        .sources-card-types { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
        .sources-card-type-tag { font-size: 9px; padding: 1px 5px; background: var(--card-bg); border-radius: 3px; color: var(--text-muted); font-weight: 500; text-transform: uppercase; }

        /* Confidence bar */
        .sources-confidence { margin-bottom: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
        .sources-confidence-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sources-confidence-title { font-size: 13px; font-weight: 600; color: var(--primary); }
        .sources-confidence-pct { font-size: 14px; font-weight: 700; }
        .sources-confidence-pct.high { color: var(--success); }
        .sources-confidence-pct.medium { color: var(--warning); }
        .sources-confidence-pct.low { color: var(--danger); }
        .sources-confidence-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .sources-confidence-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
        .sources-confidence-fill.high { background: var(--success); }
        .sources-confidence-fill.medium { background: var(--warning); }
        .sources-confidence-fill.low { background: var(--danger); }
        .sources-confidence-label { font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        /* Per-record sources list */
        .sources-list { }
        .sources-person { margin-bottom: 20px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
        .sources-person-header { padding: 12px 16px; background: var(--primary); color: white; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .sources-person-body { padding: 4px 0; }
        .sources-person-fact { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); font-size: 13px; }
        .sources-person-fact:last-child { border-bottom: none; }
        .sources-person-fact-label { flex: 1; color: var(--text); }
        .sources-person-fact-date { font-size: 11px; color: var(--text-muted); min-width: 80px; }
        .sources-person-no-source { font-size: 11px; color: var(--text-muted); padding: 8px 16px; }

        /* View toggle row */
        .sources-view-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .sources-view-total { font-size: 12px; color: var(--text-muted); margin-left: auto; }

        /* Source detail panel */
        .source-panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; justify-content: flex-end; }
        .source-panel { width: 400px; max-width: 95vw; background: var(--card-bg); height: 100%; overflow-y: auto; padding: 20px; box-shadow: -4px 0 20px rgba(0,0,0,0.15); }
        .source-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid var(--accent); }
        .source-panel-title { font-size: 16px; font-weight: 600; color: var(--primary); }
        .source-panel-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-muted); padding: 0; line-height: 1; }
        .source-panel-close:hover { color: var(--text); }
        .source-panel-item { padding: 12px; background: var(--bg); border-radius: 8px; margin-bottom: 8px; border: 1px solid var(--border); }
        .source-panel-item-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
        .source-panel-item-detail { font-size: 11px; color: var(--text-muted); }
        .source-panel-empty { text-align: center; color: var(--text-muted); padding: 40px; font-size: 13px; }
    </style>
</head>
<body>
    <header class="header">
        <h1>🌳 RGVL</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </header>
    <nav class="sidebar" id="sidebar">
        <a class="nav-item active" data-section="overview">📊 Visão Geral</a>
        <a class="nav-item" data-section="family">👨‍👩‍👧 Família</a>
        <a class="nav-item" data-section="person">👤 Dados Pessoais</a>
        <a class="nav-item" data-section="companies">🏢 Empresas</a>
        <a class="nav-item" data-section="properties">🏠 Imóveis</a>
        <a class="nav-item" data-section="timeline">📅 Timeline</a>
        <a class="nav-item" data-section="sources">📊 Sources</a>
    </nav>
    <main class="main"><div id="app"><div class="loading"><div class="spinner"></div>Carregando...</div></div></main>
    <script>
    async function findAPI() {
        const o = window.location.origin;
        const ports = [5003];
        for (const p of ports) {
            try { const r = await fetch(`${o.replace(/:\d+/, ':'+p)}/api/health`, {signal:AbortSignal.timeout(3000)}); if (r.ok) return `${o.replace(/:\d+/, ':'+p)}/api`; } catch(e) {}
        }
        return `${o.replace(/:\d+/, ':5003')}/api`;
    }

    function esc(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function fmtDate(d) { if (!d) return '-'; try { return new Date(d).toLocaleDateString('pt-BR'); } catch(e) { return d; } }
    function fmtMoney(v) { if (!v) return '-'; return new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v); }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

    // Click navigation
    document.querySelectorAll('.nav-item').forEach(el => {
        el.addEventListener('click', function() {
            document.getElementById(this.dataset.section).scrollIntoView({behavior:'smooth'});
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
        });
    });

    // Scroll-spy: update active nav item based on scroll position
    // ===== SOURCES HELPERS =====

    const SOURCE_EMOJI = {
        gmail:'📧', google_drive:'📄', tjmg:'🏛️', tjsp:'⚖️',
        jucemg:'📋', jucep:'📋', cartorio:'📜', web_search:'🔍',
        familysearch:'👨‍👩‍👧', manual:'✏️', crea:'🏗️', linkedin:'💼',
        escavador:'🔎', inteli:'💡', default:'🔗'
    };

    const SOURCE_LABELS = {
        gmail:'Gmail', google_drive:'Google Drive', tjmg:'TJMG', tjsp:'TJSP',
        jucemg:'JUCEMG', jucep:'JUCEP', cartorio:'Cartório', web_search:'Web Search',
        familysearch:'FamilySearch', manual:'Manual', crea:'CREA', linkedin:'LinkedIn',
        escavador:'Escavador', inteli:'INTEL', default:'Outro'
    };

    function sourceBadgeHTML(type, size) {
        const t = type || 'default';
        const emoji = SOURCE_EMOJI[t] || '🔗';
        const label = SOURCE_LABELS[t] || SOURCE_LABELS.default;
        return `<span class="source-badge source-${t} ${size||''}">${emoji} ${label}</span>`;
    }

    function switchSourcesTab(tab) {
        document.querySelectorAll('.sources-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.sources-tab[data-tab="${tab}"]`).classList.add('active');
        document.getElementById('sources-dashboard').style.display = tab === 'dashboard' ? '' : 'none';
        document.getElementById('sources-records').style.display = tab === 'records' ? '' : 'none';
    }

    function openSourcePanel(source) {
        // Remove existing
        const existing = document.querySelector('.source-panel-overlay');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.className = 'source-panel-overlay';
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };

        const info = SOURCE_LABELS[source.type] || source.type;
        const emoji = SOURCE_EMOJI[source.type] || '🔗';
        const recordsList = (source.records || []).map(r => {
            return `<div class="source-panel-item">
                <div class="source-panel-item-title">${esc(r.label || r.nome_fantasia || r.descricao || r.nome_completo || '—')}</div>
                <div class="source-panel-item-detail">${esc(r.detail || '')}</div>
            </div>`;
        }).join('');

        overlay.innerHTML = `
        <div class="source-panel">
            <div class="source-panel-header">
                <span class="source-panel-title">${emoji} ${esc(info)}</span>
                <button class="source-panel-close" onclick="this.closest('.source-panel-overlay').remove()">×</button>
            </div>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:16px">
                <strong>${source.count || 0}</strong> registros · Última coleta: ${source.last_collected || '—'}
            </div>
            ${recordsList || '<div class="source-panel-empty">Nenhum registro detalhado disponível</div>'}
        </div>`;
        document.body.appendChild(overlay);

        // ESC to close
        const escHandler = function(e) { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
        document.addEventListener('keydown', escHandler);
    }

    function renderSources(data) {
        const container = document.getElementById('sources-grid');
        if (!container) return;

        // Confidence bar
        const confEl = document.getElementById('sources-confidence');
        const confPct = document.getElementById('sources-confidence-pct');
        const confFill = document.getElementById('sources-confidence-fill');
        const confLabel = document.getElementById('sources-confidence-label');
        if (data.total_records !== undefined) {
            const pct = data.confidence_percent || 0;
            const cls = pct >= 80 ? 'high' : pct >= 50 ? 'medium' : 'low';
            confEl.style.display = '';
            confPct.textContent = pct + '%';
            confPct.className = 'sources-confidence-pct ' + cls;
            confFill.style.width = pct + '%';
            confFill.className = 'sources-confidence-fill ' + cls;
            confLabel.textContent = `${data.total_records} registros com fonte identificada de ~${data.total_estimated} total`;
        } else {
            confEl.style.display = 'none';
        }

        // Dashboard grid
        const sources = (data.sources || []).filter(s => s.count > 0);

        container.innerHTML = sources.map(s => {

    function renderSourcesRecords(recordsData, apiCtx) {
        const container = document.getElementById('sources-list');
        const totalEl = document.getElementById('sources-view-total');
        if (!container) return;

        // recordsData is the D.sources object which has summary data
        // We need to fetch the /api/sources/records endpoint
        const apiUrl = apiCtx || api || 'http://localhost:5003';
        fetch(apiUrl+'/sources/records')
            .then(r => r.json())
            .then(data => {
                const records = data.records || [];
                totalEl.textContent = `${data.total} registros por pessoa`;

                if (records.length === 0) {
                    container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">Nenhum registro encontrado</div>';
                    return;
                }

                // Group by person_name
                const byPerson = {};
                for (const r of records) {
                    const name = r.person_name || 'Desconhecido';
                    if (!byPerson[name]) byPerson[name] = [];
                    byPerson[name].push(r);
                }

                const persons = Object.entries(byPerson).sort((a,b) => a[0].localeCompare(b[0]));
                container.innerHTML = persons.map(([name, recs]) => `
                    <div class="sources-person-group">
                        <div class="sources-person-name">${esc(name)} <span style="color:var(--text-muted);font-weight:400">(${recs.length} registros)</span></div>
                        <div class="sources-person-records">
                            ${recs.map(r => `
                                <div class="sources-record-item">
                                    <span class="source-badge source-${r.source_type || 'default'} sm">${r.source_emoji || '🔗'} ${esc(r.source_label || r.source_type || 'Outro')}</span>
                                    <span class="sources-record-type">${esc(r.record_type)}</span>
                                    <span class="sources-record-label">${esc(String(r.record_label || '').substring(0, 60))}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            })
            .catch(() => {
                container.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:20px">Erro ao carregar registros</div>';
            });
    }

    function initScrollSpy() {
        const sections = document.querySelectorAll('.section[id]');
        if (!sections.length) return;

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    const active = document.querySelector(`.nav-item[data-section="${id}"]`);
                    if (active) active.classList.add('active');
                }
            });
        }, { rootMargin: '-80px 0px -60% 0px', threshold: 0 });

        sections.forEach(section => observer.observe(section));
    }

                fetch(api+'/family/generation/2').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/generation/3').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/generation/4').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/assets/companies').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/assets/properties').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/summary').then(r=>r.json()).catch(()=>{}),
                fetch(api+'/research/tasks?status=pendente').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/family/timeline').then(r=>r.json()).catch(()=>[]),
                fetch(api+'/sources/summary').then(r=>r.json()).catch(()=>({total_records:0,sources:[]})),

            <div class="section-title">📅 Linha do Tempo</div>
            <div class="timeline" id="timeline-container">
                <div class="loading">Carregando eventos...</div>
            </div>
        </div>

        <!-- Sources -->
        <div class="section" id="sources">
            <div class="section-title">📜 Fontes dos Dados</div>

            <!-- Confidence bar -->
            <div class="sources-confidence" id="sources-confidence" style="display:none">
                <div class="sources-confidence-header">
                    <span class="sources-confidence-title">📎 Confiança dos Dados</span>
                    <span class="sources-confidence-pct" id="sources-confidence-pct">—</span>
                </div>
                <div class="sources-confidence-bar">
                    <div class="sources-confidence-fill" id="sources-confidence-fill" style="width:0%"></div>
                </div>
                <div class="sources-confidence-label" id="sources-confidence-label"></div>
            </div>

            <!-- Tabs -->
            <div class="sources-tabs">
                <div class="sources-tab active" data-tab="dashboard" onclick="switchSourcesTab('dashboard')">📊 Dashboard</div>
                <div class="sources-tab" data-tab="records" onclick="switchSourcesTab('records')">📜 Por Registro</div>
            </div>

            <!-- Dashboard view -->
            <div id="sources-dashboard">
                <div class="sources-grid" id="sources-grid"></div>
            </div>

            <!-- Per-record view -->
            <div id="sources-records" style="display:none">
                <div class="sources-view-toggle">
                    <div class="sources-view-total" id="sources-view-total"></div>
                </div>
                <div id="sources-list"></div>
            </div>
        </div>
        `;
        initScrollSpy();
        
        // Render Timeline
        const tl = document.getElementById('timeline-container');
        if (tl && D.timeline && D.timeline.length > 0) {
            tl.innerHTML = D.timeline.map(e => {
                // CSS class map for event types
                const typeClasses = {
                    'birth': 'birth', 'death': 'death', 'marriage': 'marriage',
                    'company': 'company', 'legal': 'legal', 'research': 'research',
                    'family_contact': 'family_contact', 'paternity': 'paternity',
                    'name_change': 'name_change', 'default': 'default'
                };

                // Handle dates: ~ prefix means approximate
                let dateDisplay = '-';
                if (e.event_date) {
                    const raw = String(e.event_date);
                    if (raw.startsWith('~')) {
                        dateDisplay = fmtDate(raw.substring(1)) + ' <span style="color:var(--text-muted);font-size:11px">(aproximado)</span>';
                    } else {
                        dateDisplay = fmtDate(raw);
                    }
                }

                const typeKey = e.event_type || 'default';
                const cssClass = typeClasses[typeKey] || 'default';
                const TL_EMOJI = {'birth':'👶','death':'⚰️','marriage':'💍','company':'🏢','name_change':'✏️','legal':'⚖️','paternity':'🤝','family_contact':'📞','default':'📋'};
                const tlEmoji = TL_EMOJI[typeKey] || '';

                // Source badge from event's source field or source_type
                let sourceBadge = '';
                const srcType = e.source_type || e.fonte || 'default';
                if (srcType && srcType !== 'eventos') {
                    sourceBadge = ' ' + sourceBadgeHTML(srcType, 'sm');
                }

                return `
                <div class="timeline-event">
                    <div class="timeline-date">${dateDisplay}</div>
                    <div class="timeline-person">${esc(e.person_name || 'Unknown')}</div>
                    <span class="timeline-type ${cssClass}">${tlEmoji} ${esc(typeKey)}</span>${sourceBadge}
                    <div class="timeline-desc">${esc(e.description || '')}</div>
                </div>`;
            }).join('');
        } else if (tl) {
            tl.innerHTML = '<div class="timeline-empty">Nenhum evento encontrado</div>';

        }

        // Render Sources panel
        if (D.sources && D.sources.sources) {
            renderSources(D.sources);
        } else if (D.sources && Array.isArray(D.sources)) {
            // Legacy format: { sources: [...] }
            renderSources({ sources: D.sources, total_records: D.sources.reduce((s,x) => s + (x.count||0), 0) });
        }
        }

    load();
    </script>
</body>
</html>
