<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - RGVL</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E7EB;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 { color: #1F2937; font-size: 20px; margin-bottom: 10px; }
        p { color: #6B7280; font-size: 14px; }
        .error { color: #DC2626; }
        .debug { background: #F3F4F6; padding: 12px; border-radius: 6px; margin-top: 16px; font-size: 11px; text-align: left; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="spinner"></div>
        <h1>Autenticando...</h1>
        <p>Aguarde enquanto redirecionamos você.</p>
    </div>

    <script src="auth.js"></script>
    <script>
        async function init() {
            const content = document.getElementById('content');
            const hash = window.location.hash;
            
            // Debug: show what we received
            console.log('Callback hash:', hash);
            
            // Check for Auth0 error
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                const error = params.get('error');
                const errorDesc = params.get('error_description');
                
                if (error) {
                    content.innerHTML = `
                        <h1 class="error">⚠️ Erro Auth0</h1>
                        <p><strong>${escapeHtml(error)}</strong></p>
                        <p>${escapeHtml(errorDesc || '')}</p>
                        <div class="debug"><strong>URL:</strong> ${escapeHtml(window.location.href)}</div>
                        <p style="margin-top:20px"><a href="/">Voltar ao portal</a></p>
                    `;
                    return;
                }
            }
            
            try {
                const token = handleCallback();
                
                if (token) {
                    content.innerHTML = `
                        <div class="spinner"></div>
                        <h1>Login realizado!</h1>
                        <p>Redirecionando para o portal...</p>
                    `;
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    content.innerHTML = `
                        <h1 class="error">⚠️ Erro na autenticação</h1>
                        <p>Não foi possível completar o login.</p>
                        <div class="debug"><strong>Hash:</strong> ${escapeHtml(hash || 'vazio')}</div>
                        <p style="margin-top:20px"><a href="/">Voltar ao portal</a></p>
                    `;
                }
            } catch(e) {
                content.innerHTML = `
                    <h1 class="error">⚠️ Erro</h1>
                    <p>${escapeHtml(e.message)}</p>
                    <div class="debug"><strong>Hash:</strong> ${escapeHtml(hash || 'vazio')}</div>
                    <p style="margin-top:20px"><a href="/">Voltar ao portal</a></p>
                `;
            }
        }
        
        function escapeHtml(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        
        init();
    </script>
</body>
</html>
