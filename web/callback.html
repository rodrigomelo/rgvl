<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - RGVL</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E7EB;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { color: #1F2937; font-size: 20px; margin-bottom: 10px; }
        p { color: #6B7280; font-size: 14px; }
        .error { color: #DC2626; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="spinner"></div>
        <h1>Autenticando...</h1>
        <p>Aguarde enquanto redirecionamos você.</p>
    </div>

    <script src="auth.js"></script>
    <script>
        function init() {
            const hash = window.location.hash;
            const params = new URLSearchParams(hash.substring(1));
            
            // Check for error
            const error = params.get('error');
            if (error) {
                document.getElementById('content').innerHTML = 
                    '<h1 class="error">⚠️ Erro</h1><p>' + params.get('error_description') + '</p><p style="margin-top:20px"><a href="/">Voltar</a></p>';
                return;
            }
            
            const accessToken = params.get('access_token');
            if (!accessToken) {
                document.getElementById('content').innerHTML = 
                    '<h1 class="error">⚠️ Token não encontrado</h1><p style="margin-top:20px"><a href="/">Voltar</a></p>';
                return;
            }
            
            // Store token
            localStorage.setItem('access_token', accessToken);
            
            // Store id_token if present
            const idToken = params.get('id_token');
            if (idToken) {
                localStorage.setItem('id_token', idToken);
                try {
                    const payload = JSON.parse(atob(idToken.split('.')[1]));
                    localStorage.setItem('user', JSON.stringify({
                        name: payload.name || payload.email,
                        email: payload.email,
                        picture: payload.picture || null
                    }));
                } catch(e) {}
            }
            
            // Clean URL and redirect to home
            window.location.href = '/';
        }
        
        init();
    </script>
</body>
</html>
