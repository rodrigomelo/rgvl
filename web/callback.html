<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating... - RGVL</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #F5F7FA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E7EB;
            border-top-color: #3B82F6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 { color: #1F2937; font-size: 20px; margin-bottom: 10px; }
        p { color: #6B7280; font-size: 14px; }
        .error { color: #DC2626; }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="spinner"></div>
        <h1>Autenticando...</h1>
        <p>Aguarde enquanto redirecionamos você.</p>
    </div>

    <script src="auth.js"></script>
    <script>
        async function init() {
            const content = document.getElementById('content');
            
            try {
                const token = handleCallback();
                
                if (token) {
                    content.innerHTML = `
                        <div class="spinner"></div>
                        <h1>Login realizado!</h1>
                        <p>Redirecionando para o portal...</p>
                    `;
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    content.innerHTML = `
                        <h1 class="error">⚠️ Erro na autenticação</h1>
                        <p>Não foi possível completar o login.</p>
                        <p style="margin-top:20px">
                            <a href="/">Voltar ao portal</a>
                        </p>
                    `;
                }
            } catch(e) {
                content.innerHTML = `
                    <h1 class="error">⚠️ Erro</h1>
                    <p>${escapeHtml(e.message)}</p>
                    <p style="margin-top:20px">
                        <a href="/">Voltar ao portal</a>
                    </p>
                `;
            }
        }
        
        init();
    </script>
</body>
</html>
