name: RGVL CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flask requests sqlalchemy fastapi uvicorn pytest
        pip install -r data/requirements.txt
    
    - name: Run tests
      run: |
        cd data
        python -m pytest src/tests/ -v
    
    - name: Check code quality
      run: |
        pip install flake8
        flake8 src/ --max-line-length=120 --ignore=E501,W503

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker images
      run: |
        docker build -t rgvl-api -f Dockerfile .
        docker build -t rgvl-web -f Dockerfile.web .
    
    - name: Test Docker containers
      run: |
        docker run -d --name api-test -p 5004:5004 rgvl-api
        sleep 5
        curl -f http://localhost:5004/api/health || exit 1
        docker stop api-test

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to production
      run: |
        echo "🚀 Deploying RGVL to production..."
        # Add deployment commands here
        # docker-compose up -d
